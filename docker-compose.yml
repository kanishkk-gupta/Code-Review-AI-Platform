version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codeguardian-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./reports/output:/app/reports/output
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codeguardian-ui
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - STREAMLIT_API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Uncomment for Redis-backed job store:
  # redis:
  #   image: redis:7-alpine
  #   container_name: codeguardian-redis
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

volumes:
  reports_output:
